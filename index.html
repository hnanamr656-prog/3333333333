<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وردة متفتحة</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:black;
    overflow:hidden;
}

.flower{
    position:relative;
    width:300px;
    height:430px;
    animation:sway 4s ease-in-out infinite;
}

.petals{
    position:relative;
    width:180px;
    height:180px;
    margin:auto;
}

.petal{
    position:absolute;
    width:90px;
    height:90px;
    background:#ff1a1a;
    border-radius:50%;
    box-shadow:0 0 25px red;
    transform:scale(0);
    animation:bloom 2s forwards;
}

.petal:nth-child(1){top:0; left:45px; animation-delay:0.2s;}
.petal:nth-child(2){top:45px; left:0; animation-delay:0.4s;}
.petal:nth-child(3){top:45px; right:0; animation-delay:0.6s;}
.petal:nth-child(4){bottom:0; left:45px; animation-delay:0.8s;}
.petal:nth-child(5){top:30px; left:45px; animation-delay:1s;}

.center{
    position:absolute;
    top:72px;
    left:72px;
    width:36px;
    height:36px;
    background:#fff3a0;
    border-radius:50%;
    box-shadow:0 0 20px gold;
    opacity:0;
    animation:showCenter 1s forwards 1.5s;
}

.stem{
    width:12px;
    height:220px;
    background:linear-gradient(to top,#008f2f,#00ff66);
    margin:auto;
    border-radius:20px;
    box-shadow:0 0 18px #00ff66;
    position:relative;
}

.leaf{
    position:absolute;
    width:70px;
    height:35px;
    background:#00cc55;
    border-radius:70px 0;
    box-shadow:0 0 15px #00ff66;
    opacity:0;
    animation:leafShow 1s forwards 1.2s;
}

.left{
    left:-55px;
    top:70px;
    transform:rotate(-35deg);
}

.right{
    right:-55px;
    top:120px;
    transform:rotate(35deg);
}

@keyframes bloom{
    from{
        transform:scale(0) rotate(-30deg);
        opacity:0;
    }
    to{
        transform:scale(1) rotate(0deg);
        opacity:1;
    }
}

@keyframes showCenter{
    to{opacity:1;}
}

@keyframes leafShow{
    to{opacity:1;}
}

@keyframes sway{
    0%,100%{transform:rotate(-2deg);}
    50%{transform:rotate(2deg);}
}
</style>
</head>
<body>

<div class="flower">
    <div class="petals">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="center"></div>
    </div>

    <div class="stem">
        <div class="leaf left"></div>
        <div class="leaf right"></div>
    </div>
</div>

</body>
</html>
