<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وردة ضخمة</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.scene{
    position:relative;
    width:100vw;
    height:100vh;
}

.main{
    position:absolute;
    left:50%;
    bottom:-20px;
    transform:translateX(-50%);
}

.rose{
    position:relative;
    width:430px;
    height:430px;
    margin:auto;
    filter:drop-shadow(0 0 35px red);
}

.petal{
    position:absolute;
    width:200px;
    height:200px;
    background:#ff1a1a;
    border-radius:50%;
    box-shadow:0 0 35px red;
}

.petal:nth-child(1){top:0;left:115px;}
.petal:nth-child(2){top:100px;left:0;}
.petal:nth-child(3){top:100px;right:0;}
.petal:nth-child(4){bottom:0;left:115px;}
.petal:nth-child(5){top:70px;left:115px;}

.center{
    position:absolute;
    top:175px;
    left:175px;
    width:70px;
    height:70px;
    background:#ffe38a;
    border-radius:50%;
    box-shadow:0 0 30px gold;
}

.stem{
    width:22px;
    height:420px;
    margin:auto;
    background:linear-gradient(to top,#007a28,#00ff66);
    border-radius:20px;
    box-shadow:0 0 20px #00ff66;
}

.branch{
    position:absolute;
    height:10px;
    background:#00cc55;
    border-radius:10px;
    transform-origin:left center;
    width:260px;
    box-shadow:0 0 12px #00ff66;
}

.branch.left1{top:310px;left:120px;transform:rotate(-35deg);}
.branch.right1{top:310px;right:120px;transform:rotate(35deg);}
.branch.left2{top:520px;left:70px;transform:rotate(-15deg);}
.branch.right2{top:520px;right:70px;transform:rotate(15deg);}

.small{
    position:absolute;
    top:-45px;
    right:-30px;
    width:95px;
    height:95px;
    filter:drop-shadow(0 0 12px red);
}

.small .p{
    position:absolute;
    width:42px;
    height:42px;
    background:#ff1a1a;
    border-radius:50%;
}

.small .p:nth-child(1){top:0;left:26px;}
.small .p:nth-child(2){top:24px;left:0;}
.small .p:nth-child(3){top:24px;right:0;}
.small .p:nth-child(4){bottom:0;left:26px;}

.small .c{
    position:absolute;
    top:37px;
    left:37px;
    width:16px;
    height:16px;
    background:#ffe38a;
    border-radius:50%;
    box-shadow:0 0 10px gold;
}

.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:#fff;
    border-radius:50%;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:.2; transform:translateY(0);}
    to{opacity:1; transform:translateY(-12px);}
}
</style>
</head>
<body>

<div class="scene">

    <div class="main">
        <div class="rose">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="center"></div>
        </div>
        <div class="stem"></div>
    </div>

    <div class="branch left1">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch right1">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch left2">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch right2">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="sparkle" style="top:120px; left:180px;"></div>
    <div class="sparkle" style="top:200px; right:220px;"></div>
    <div class="sparkle" style="top:350px; left:300px;"></div>
    <div class="sparkle" style="top:250px; right:350px;"></div>

</div>

</body>
</html>
