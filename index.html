<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وردة تنمو</title>
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.scene{
    position:relative;
    width:500px;
    height:650px;
}

.main{
    position:absolute;
    left:50%;
    bottom:70px;
    transform:translateX(-50%);
}

.rose{
    position:relative;
    width:180px;
    height:180px;
    margin:auto;
}

.petal{
    position:absolute;
    width:90px;
    height:90px;
    background:#ff1a1a;
    border-radius:50%;
    box-shadow:0 0 20px red;
}

.petal:nth-child(1){top:0;left:45px;}
.petal:nth-child(2){top:45px;left:0;}
.petal:nth-child(3){top:45px;right:0;}
.petal:nth-child(4){bottom:0;left:45px;}
.petal:nth-child(5){top:28px;left:45px;}

.center{
    position:absolute;
    top:72px;
    left:72px;
    width:35px;
    height:35px;
    background:#ffe38a;
    border-radius:50%;
    box-shadow:0 0 15px gold;
}

.stem{
    width:12px;
    height:240px;
    margin:auto;
    background:linear-gradient(to top,#007a28,#00ff66);
    border-radius:20px;
    box-shadow:0 0 15px #00ff66;
}

.branch{
    position:absolute;
    height:6px;
    background:#00cc55;
    border-radius:10px;
    transform-origin:left center;
    width:0;
    animation:grow 2s forwards;
}

.branch.left1{top:250px;left:140px;transform:rotate(-35deg);animation-delay:.4s;}
.branch.right1{top:250px;right:140px;transform:rotate(35deg);animation-delay:.8s;}
.branch.left2{top:340px;left:110px;transform:rotate(-20deg);animation-delay:1.2s;}
.branch.right2{top:340px;right:110px;transform:rotate(20deg);animation-delay:1.6s;}

.small{
    position:absolute;
    top:-25px;
    right:-25px;
    width:55px;
    height:55px;
    opacity:0;
    animation:showRose .8s forwards;
}

.branch.left1 .small{animation-delay:2s;}
.branch.right1 .small{animation-delay:2.2s;}
.branch.left2 .small{animation-delay:2.4s;}
.branch.right2 .small{animation-delay:2.6s;}

.small .p{
    position:absolute;
    width:24px;
    height:24px;
    background:#ff1a1a;
    border-radius:50%;
    box-shadow:0 0 10px red;
}

.small .p:nth-child(1){top:0;left:15px;}
.small .p:nth-child(2){top:15px;left:0;}
.small .p:nth-child(3){top:15px;right:0;}
.small .p:nth-child(4){bottom:0;left:15px;}

.small .c{
    position:absolute;
    top:22px;
    left:22px;
    width:10px;
    height:10px;
    background:#ffe38a;
    border-radius:50%;
}

@keyframes grow{
    to{width:120px;}
}

@keyframes showRose{
    to{opacity:1;}
}
</style>
</head>
<body>

<div class="scene">

    <div class="main">
        <div class="rose">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="center"></div>
        </div>
        <div class="stem"></div>
    </div>

    <div class="branch left1">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch right1">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch left2">
        <div class="small">
            <div class="p"></div><div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="c"></div>
        </div>
    </div>

    <div class="branch right2">
        <div class="small
